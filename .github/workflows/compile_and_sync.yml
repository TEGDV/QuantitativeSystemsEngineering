name: Compile Academic Notes for NotebookLM

on:
  push:
    branches:
      - main
    paths:
      # Trigger only when LaTeX fragment files or python scripts change
      - '**.tex'
      - 'scripts/**'
      # Ignore the compiled output files to prevent infinite recursion
      - '!compiled_academic_notes.tex'
      - '!compiled_academic_notes.pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Notes Compiler
        run: |
          python scripts/compile_notes.py

      - name: Commit and Push Compiled Notes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the compiled notes files
          git add compiled_academic_notes.tex compiled_academic_notes.pdf
          
          # Check if there are differences staged
          if git diff --cached --quiet; then
            echo "No updates detected in compiled notes."
          else
            echo "Changes detected. Committing and pushing..."
            git commit -m "docs: Auto-compile academic LaTeX notes and PDF [skip ci]"
            git push origin main
          fi
